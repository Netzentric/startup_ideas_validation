<title>40 Startup Ideas 2026 — Blue Ocean & Red Ocean Playbook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0F172A;color:#E2E8F0;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px 16px}
.header{text-align:center;padding:40px 0 32px}
.header h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#60A5FA,#A78BFA,#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.header .sub{color:#94A3B8;font-size:14px;margin-top:8px}
.header .stats{display:flex;justify-content:center;gap:24px;margin-top:16px;flex-wrap:wrap}
.header .stat{background:#1E293B;border-radius:12px;padding:10px 20px;text-align:center}
.header .stat .num{font-size:22px;font-weight:800;color:#60A5FA}
.header .stat .label{font-size:11px;color:#64748B;margin-top:2px}

/* Main nav tabs */
.main-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.main-tab{padding:10px 28px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s;background:#1E293B;color:#94A3B8}
.main-tab:hover{background:#334155;color:#CBD5E1}
.main-tab.active{background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.3)}

/* Filter tabs */
.tabs{display:flex;justify-content:center;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:all .2s;background:#1E293B;color:#94A3B8}
.tab:hover{background:#334155;color:#CBD5E1}
.tab.active{color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.3)}
.tab.blue-ocean{background:linear-gradient(135deg,#0EA5E9,#6366F1)}
.tab.red-ocean{background:linear-gradient(135deg,#EF4444,#F97316)}
.tab.all-tab{background:linear-gradient(135deg,#3B82F6,#8B5CF6)}

.section-header{text-align:center;margin:32px 0 20px;position:relative}
.section-header h2{font-size:22px;font-weight:900;display:inline-block;padding:0 20px}
.section-header .line{position:absolute;top:50%;left:0;right:0;height:1px;background:#334155;z-index:0}
.section-header h2{position:relative;z-index:1;background:#0F172A}
.badge{display:inline-block;padding:4px 14px;border-radius:8px;font-size:12px;font-weight:700;margin:0 4px}
.badge-blue{background:rgba(14,165,233,0.2);color:#38BDF8;border:1px solid rgba(14,165,233,0.3)}
.badge-red{background:rgba(239,68,68,0.2);color:#F87171;border:1px solid rgba(239,68,68,0.3)}
.badge-thai{background:rgba(34,197,94,0.2);color:#4ADE80;border:1px solid rgba(34,197,94,0.3)}
.badge-intl{background:rgba(168,85,247,0.2);color:#C084FC;border:1px solid rgba(168,85,247,0.3)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:#1E293B;border-radius:16px;padding:20px;cursor:pointer;border:1px solid #334155;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3);border-color:#475569}
.card .accent{position:absolute;top:0;left:0;right:0;height:3px}
.card .top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.card .emoji{font-size:32px;flex-shrink:0}
.card .badges{display:flex;gap:4px;flex-wrap:wrap}
.card h3{font-size:17px;font-weight:800;color:#F1F5F9;margin-bottom:4px}
.card .meta{font-size:12px;color:#64748B;margin-bottom:10px}
.card .tagline{font-size:13px;color:#94A3B8;margin-bottom:14px;line-height:1.5}
.mini-bar{width:100%;height:6px;background:#334155;border-radius:3px;overflow:hidden;margin-top:8px}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.card .score-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.card .score-total{font-size:20px;font-weight:900}
.card .score-label{font-size:11px;color:#64748B}

.detail{max-width:800px;margin:0 auto}
.back-btn{background:none;border:none;color:#60A5FA;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:#93C5FD}
.detail-card{background:#1E293B;border-radius:20px;padding:32px;border:1px solid #334155}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.detail-header .emoji{font-size:48px}
.detail-header h2{font-size:26px;font-weight:900;color:#F1F5F9}
.detail-header .meta{font-size:13px;color:#64748B;margin-top:4px}
.detail-tagline{font-size:16px;color:#94A3B8;border-left:3px solid;padding-left:16px;margin-bottom:28px;line-height:1.6}
.section{margin-bottom:20px}
.section-title{font-size:12px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section p{font-size:14px;line-height:1.7;color:#CBD5E1}

.scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
@media(max-width:600px){.scores-grid{grid-template-columns:1fr}}
.score-item{background:#0F172A;border-radius:12px;padding:14px}
.score-item .label{font-size:12px;color:#94A3B8;margin-bottom:6px}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:8px;background:#334155;border-radius:4px;overflow:hidden}
.bar-fg{height:100%;border-radius:4px}
.val{font-size:14px;font-weight:800;min-width:35px;text-align:right}

.review-box{background:#0F172A;border-radius:14px;padding:20px;margin-top:20px;border-left:3px solid}
.review-box h4{font-size:13px;font-weight:800;margin-bottom:8px}
.review-box p{font-size:14px;line-height:1.7;color:#CBD5E1}
.improve-box{background:#0F172A;border-radius:14px;padding:20px;margin-top:12px;border-left:3px solid #34D399}
.improve-box h4{font-size:13px;font-weight:800;color:#34D399;margin-bottom:8px}
.improve-box p{font-size:14px;line-height:1.7;color:#CBD5E1}

/* Rankings */
.rank-list{max-width:800px;margin:0 auto}
.rank-item{display:flex;align-items:center;gap:16px;background:#1E293B;border-radius:14px;padding:16px 20px;margin-bottom:10px;border:1px solid #334155;transition:all .2s;cursor:pointer}
.rank-item:hover{border-color:#475569;background:#253348}
.rank-item.gold{border:2px solid #F59E0B;background:linear-gradient(135deg,#1E293B,#2D2006)}
.rank-item.silver{border:2px solid #94A3B8;background:linear-gradient(135deg,#1E293B,#1E2530)}
.rank-item.bronze{border:2px solid #CD7F32;background:linear-gradient(135deg,#1E293B,#2B1F0F)}
.rank-num{font-size:24px;font-weight:900;width:44px;text-align:center}
.rank-info{flex:1}
.rank-info .name{font-size:16px;font-weight:700;color:#F1F5F9}
.rank-info .desc{font-size:12px;color:#64748B;margin-top:2px}
.rank-score{font-size:28px;font-weight:900;text-align:right}
.rank-score span{font-size:14px;color:#64748B;font-weight:400}

/* Recommendations */
.rec{max-width:800px;margin:0 auto}
.rec-intro{text-align:center;margin-bottom:28px}
.rec-intro h2{font-size:24px;font-weight:900;color:#F1F5F9;margin-bottom:8px}
.rec-intro p{font-size:14px;color:#94A3B8}
.rec-card{background:#1E293B;border-radius:16px;padding:24px;margin-bottom:16px}
.priority{font-size:12px;font-weight:800;padding:4px 14px;border-radius:8px;color:#fff;display:inline-block;margin-bottom:12px}
.name-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.name-row h3{font-size:22px;font-weight:900;color:#F1F5F9}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field-val{font-size:14px;line-height:1.6;color:#CBD5E1}
.bottom-cta{background:linear-gradient(135deg,#1E3A5F,#2D1B4E);border-radius:16px;padding:32px;margin-top:28px;text-align:center;border:1px solid #334155}
.bottom-cta h3{font-size:20px;font-weight:900;color:#F5C542;margin-bottom:12px}
.bottom-cta p{font-size:15px;line-height:1.7;color:#94A3B8}

.search-box{max-width:400px;margin:0 auto 24px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 40px;border-radius:12px;border:1px solid #334155;background:#1E293B;color:#E2E8F0;font-size:14px;outline:none}
.search-box input:focus{border-color:#60A5FA}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#64748B}

@media(max-width:640px){
  .header h1{font-size:22px}
  .grid{grid-template-columns:1fr}
  .detail-card{padding:20px}
  .header .stats{gap:12px}
  .tabs{gap:4px}
  .tab{padding:7px 12px;font-size:11px}
  .main-tabs{gap:4px}
  .main-tab{padding:8px 16px;font-size:12px}
}
</style>
</head>

const MAX_SCORE=20;
const totalScore=(s)=>Object.values(s).reduce((a,b)=>a+b,0);
const sorted=[...IDEAS].sort((a,b)=>totalScore(b.scores)-totalScore(a.scores));
const avgScore=Math.round(IDEAS.reduce((a,i)=>a+totalScore(i.scores),0)/IDEAS.length*10)/10;
const maxScoreVal=Math.max(...IDEAS.map(i=>totalScore(i.scores)));

function ScoreBar({score,max=5,color}){
  const pct=score/max*100;
  const c=score>=4?"#22C55E":score>=3?"#F59E0B":"#EF4444";
  return React.createElement("div",{className:"bar-wrap"},
    React.createElement("div",{className:"bar-bg"},
      React.createElement("div",{className:"bar-fg",style:{width:pct+"%",background:color||c}})
    ),
    React.createElement("span",{className:"val",style:{color:color||c}},score)
  );
}

      const q=search.toLowerCase();
      items=items.filter(i=>i.name.toLowerCase().includes(q)||i.tagline.toLowerCase().includes(q)||i.problem.toLowerCase().includes(q));

    return items;
  },[filter,search]);

  const mainTabs=[
    {key:"overview",label:"💡 ไอเดียทั้งหมด"},

    {key:"red-thai",label:"🔴 Red Ocean — Thai",cls:"red-ocean"},
    {key:"red-intl",label:"🔴 Red Ocean — Intl",cls:"red-ocean"}

        React.createElement("span",{className:"score-label"},"Score (Rank #"+rank+")"),

  function renderDetail(){
    const idea=IDEAS.find(i=>i.id===selected);

    const scoreLabels=[

      {key:"monetization",label:"รายได้ชัดเจน",desc:"ใครจ่ายเงิน? เท่าไหร่? พิสูจน์แล้ว?"},
      {key:"mvpEase",label:"สร้าง MVP ได้เร็ว",desc:"1-2 คน สร้างได้ใน 1-4 สัปดาห์?"},

      {icon:"🛡️",label:"ทำไมคู่แข่ง copy ยาก (Moat)",text:idea.moat},
      {icon:"💰",label:"วิธีทำเงิน",text:idea.revenue},

      {icon:"⚠️",label:"ความเสี่ยง + วิธีแก้",text:idea.risk},

    return React.createElement("div",{className:"detail"},
      React.createElement("button",{className:"back-btn",onClick:()=>setSelected(null)},"← กลับ"),

            )
          )
        ),
        React.createElement("div",{className:"detail-tagline",style:{borderColor:idea.color}},'"'+idea.tagline+'"'),
        sections.map(s=>React.createElement("div",{key:s.label,className:"section"},
          React.createElement("div",{className:"section-title"},React.createElement("span",null,s.icon),s.label),
          React.createElement("p",null,s.text)
        )),
        React.createElement("div",{style:{marginTop:24}},
          React.createElement("div",{className:"section-title",style:{marginBottom:16}},"📈 คะแนน Kill Test (ยิ่งสูงยิ่งดี)"),
          React.createElement("div",{className:"scores-grid"},
            scoreLabels.map(sl=>React.createElement("div",{key:sl.key,className:"score-item"},
              React.createElement("div",{className:"label"},sl.label),
              React.createElement("div",{style:{fontSize:11,color:"#64748B",marginBottom:6}},sl.desc),
              React.createElement(ScoreBar,{score:idea.scores[sl.key],color:idea.color})
            )),
            React.createElement("div",{className:"score-item",style:{background:"linear-gradient(135deg,#0F172A,#1A1040)"}},
              React.createElement("div",{className:"label"},"รวมทั้งหมด"),
              React.createElement("div",{style:{fontSize:28,fontWeight:900,color:totalScore(idea.scores)>=16?"#22C55E":totalScore(idea.scores)>=12?"#F59E0B":"#EF4444",marginTop:4}},totalScore(idea.scores)+"/"+MAX_SCORE)
            )
          )
        ),
        React.createElement("div",{className:"review-box",style:{borderColor:idea.color}},
          React.createElement("h4",{style:{color:idea.color}},"🔍 วิเคราะห์"),
          React.createElement("p",null,idea.review)

        React.createElement("div",{className:"improve-box"},
          React.createElement("h4",null,"✅ แนะนำปรับปรุง"),
          React.createElement("p",null,idea.improvement)

      )

  }

  function renderGrouped(){
    const groups=[
      {key:"blue-thai",title:"🔵 Blue Ocean — เริ่มในไทย",desc:"ตลาดใหม่ คู่แข่งน้อย เริ่มจากประเทศไทย",items:IDEAS.filter(i=>i.ocean==="Blue Ocean"&&i.region==="Start in Thai")},
      {key:"blue-intl",title:"🔵 Blue Ocean — International",desc:"ตลาดใหม่ คู่แข่งน้อย เริ่มจากตลาดต่างประเทศ",items:IDEAS.filter(i=>i.ocean==="Blue Ocean"&&i.region==="International")},
      {key:"red-thai",title:"🔴 Red Ocean — เริ่มในไทย",desc:"ตลาดเดิมที่มีช่องว่าง เริ่มจากประเทศไทย",items:IDEAS.filter(i=>i.ocean==="Red Ocean"&&i.region==="Start in Thai")},
      {key:"red-intl",title:"🔴 Red Ocean — International",desc:"ตลาดเดิมที่มีช่องว่าง เริ่มจากตลาดต่างประเทศ",items:IDEAS.filter(i=>i.ocean==="Red Ocean"&&i.region==="International")}
    ];
    if(search.trim()||filter!=="all"){
      return React.createElement("div",{className:"grid"},filtered.map(renderCard));
    }
    return groups.map(g=>React.createElement("div",{key:g.key},
      React.createElement("div",{className:"section-header"},
        React.createElement("div",{className:"line"}),
        React.createElement("h2",null,g.title)
      ),
      React.createElement("p",{style:{textAlign:"center",color:"#64748B",fontSize:13,marginBottom:16}},g.desc),
      React.createElement("div",{className:"grid",style:{marginBottom:32}},g.items.map(renderCard))
    ));
  }

  function renderRankings(){
    return React.createElement("div",{className:"rank-list"},
      React.createElement("h2",{style:{textAlign:"center",fontSize:24,fontWeight:900,marginBottom:24,color:"#F1F5F9"}},"🏆 Power Rankings (40 Ideas)"),
      sorted.map((idea,i)=>{
        const score=totalScore(idea.scores);
        const cls=i===0?"gold":i===1?"silver":i===2?"bronze":"";
        const numColor=i===0?"#F5C542":i===1?"#94A3B8":i===2?"#CD7F32":"#475569";
        return React.createElement("div",{key:idea.id,className:"rank-item "+cls,onClick:()=>{setSelected(idea.id);setMainView("overview")},style:{cursor:"pointer"}},
          React.createElement("span",{className:"rank-num",style:{color:numColor}},i<3?["🥇","🥈","🥉"][i]:"#"+(i+1)),
          React.createElement("span",{style:{fontSize:28}},idea.emoji),
          React.createElement("div",{className:"rank-info"},
            React.createElement("div",{className:"name"},idea.name),
            React.createElement("div",{className:"desc"},idea.ocean+" • "+idea.region+" • "+idea.marketSize)
          ),
          React.createElement("div",{className:"rank-score",style:{color:score>=16?"#22C55E":score>=12?"#F59E0B":"#EF4444"}},
            score,React.createElement("span",null,"/"+MAX_SCORE)
          )
        );
      })

  }

  function renderRecommendations(){
    const top5=sorted.slice(0,5);
    const recs=[
      {rank:"เริ่มเลย",name:top5[0].name,emoji:top5[0].emoji,color:top5[0].color,
        when:"Month 1-3 — เริ่มทันที",
        why:"คะแนนสูงสุด ตลาดพร้อม ปัญหาชัดเจน คนยินดีจ่าย",
        action:"Month 1: Validate กับ 20+ ลูกค้าเป้าหมาย → Month 2: สร้าง MVP → Month 3: หา 3 paying customers → Raise seed",
        pivot:"จาก tool → platform → ecosystem ของ SME"},
      {rank:"ทำคู่กัน",name:top5[1].name+" + "+top5[2].name,emoji:top5[1].emoji+" "+top5[2].emoji,color:"#06B6D4",
        when:"Month 3-6 — สร้าง ecosystem",
        why:"ทั้ง 2 ตัวเสริมกัน cross-sell ได้ ลูกค้ากลุ่มเดียวกัน",
        action:"Month 3-4: Launch MVP ตัวแรก → Month 5-6: เพิ่มตัวที่สองเป็น module → bundle ขายคู่กัน",
        pivot:"2 products → 1 integrated platform สำหรับ SME"},
      {rank:"Long-term",name:top5[3].name+" + "+top5[4].name,emoji:top5[3].emoji+" "+top5[4].emoji,color:"#F59E0B",
        when:"Month 6-12 — Research + ทดลอง",
        why:"ตลาดกำลังโต ใช้เวลา research + สร้าง prototype ก่อน",
        action:"ทดลองสร้าง prototype → เก็บ feedback จากลูกค้า → ตัดสินใจ pivot หรือขยายเมื่อ timing พร้อม",
        pivot:"จาก prototype → full product เมื่อตลาดพร้อม"}
    ];

    return React.createElement("div",{className:"rec"},
      React.createElement("div",{className:"rec-intro"},
        React.createElement("h2",null,"🎯 คำแนะนำจาก 40 Ideas"),
        React.createElement("p",null,"จาก 40 ideas ทั้งหมดผ่าน Kill Test — นี่คือลำดับที่แนะนำ (จาก Score + Research)")
      ),
      recs.map((rec,i)=>React.createElement("div",{key:i,className:"rec-card",style:{borderColor:rec.color+"40",borderWidth:2,borderStyle:"solid"}},
        React.createElement("span",{className:"priority",style:{background:rec.color}},rec.rank),
        React.createElement("div",{className:"name-row"},
          React.createElement("span",{style:{fontSize:32}},rec.emoji),
          React.createElement("h3",null,rec.name)
        ),
        [{l:"⏰ เมื่อไหร่?",v:rec.when},{l:"💡 ทำไม?",v:rec.why},{l:"📋 Action Plan",v:rec.action},{l:"🔄 Pivot Strategy",v:rec.pivot}].map((f,j)=>
          React.createElement("div",{key:j,className:"field"},
            React.createElement("div",{className:"field-label"},f.l),
            React.createElement("div",{className:"field-val"},f.v)
          )
        )
      )),
      React.createElement("div",{className:"bottom-cta"},
        React.createElement("h3",null,"⚡ สรุป"),
        React.createElement("p",null,
          "ทั้ง 40 ไอเดียผ่าน Kill Test แล้ว — เริ่มจาก ",
          React.createElement("strong",{style:{color:top5[0].color}},top5[0].name),
          " (คะแนนสูงสุด) คู่กับ ",
          React.createElement("strong",{style:{color:top5[1].color}},top5[1].name),
          " แล้วค่อยขยายไป ",
          React.createElement("strong",{style:{color:"#F59E0B"}},top5[3].name),
          " เมื่อตลาดพร้อม"
        )
      )
    );
  }

  return React.createElement("div",{className:"container"},
    React.createElement("div",{className:"header"},
      React.createElement("h1",null,"40 STARTUP IDEAS 2026"),
      React.createElement("div",{className:"sub"},"Research-Backed Playbook — Blue Ocean & Red Ocean × Thai & International"),
      React.createElement("div",{className:"stats"},
        React.createElement("div",{className:"stat"},React.createElement("div",{className:"num"},"40"),React.createElement("div",{className:"label"},"IDEAS")),
        React.createElement("div",{className:"stat"},React.createElement("div",{className:"num"},"40/40"),React.createElement("div",{className:"label"},"PASSED")),
        React.createElement("div",{className:"stat"},React.createElement("div",{className:"num"},avgScore),React.createElement("div",{className:"label"},"AVG SCORE")),
        React.createElement("div",{className:"stat"},React.createElement("div",{className:"num"},maxScoreVal),React.createElement("div",{className:"label"},"TOP SCORE"))
      )
    ),
    React.createElement("div",{className:"main-tabs"},
      mainTabs.map(t=>React.createElement("button",{key:t.key,className:"main-tab"+(mainView===t.key?" active":""),onClick:()=>{setMainView(t.key);setSelected(null);setFilter("all");setSearch("")}},t.label))
    ),
    mainView==="overview"&&!selected&&React.createElement("div",{className:"search-box"},
      React.createElement("span",{className:"icon"},"🔍"),
      React.createElement("input",{placeholder:"ค้นหา idea...",value:search,onChange:e=>setSearch(e.target.value)})
    ),
    mainView==="overview"&&!selected&&React.createElement("div",{className:"tabs"},
      filterTabs.map(t=>React.createElement("button",{key:t.key,className:"tab"+(filter===t.key?" active "+t.cls:""),onClick:()=>setFilter(t.key)},t.label))
    ),
    mainView==="overview"&&(selected?renderDetail():renderGrouped()),
    mainView==="rankings"&&renderRankings(),
    mainView==="recommendations"&&renderRecommendations()
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
