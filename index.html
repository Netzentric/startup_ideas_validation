*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0F172A;color:#E2E8F0;min-height:100vh}

.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.header{text-align:center;padding:40px 0 32px}
.header h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#60A5FA,#A78BFA,#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.header .sub{color:#94A3B8;font-size:14px;margin-top:8px}
.header .stats{display:flex;justify-content:center;gap:24px;margin-top:16px;flex-wrap:wrap}
.header .stat{background:#1E293B;border-radius:12px;padding:10px 20px;text-align:center}
.header .stat .num{font-size:22px;font-weight:800;color:#60A5FA}
.header .stat .label{font-size:11px;color:#64748B;margin-top:2px}

.tabs{display:flex;justify-content:center;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.tab{padding:10px 24px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:all .2s;background:#1E293B;color:#94A3B8}
.tab:hover{background:#334155;color:#CBD5E1}
.tab.active{background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.3)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:#1E293B;border-radius:16px;padding:20px;cursor:pointer;border:1px solid #334155;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3);border-color:#475569}
.card .accent{position:absolute;top:0;left:0;right:0;height:3px}
.card .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card .emoji{font-size:32px}
.card .rank-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;background:#334155;color:#94A3B8}
.card .rank-badge.top3{background:linear-gradient(135deg,#F59E0B,#EF4444);color:#fff}
.card h3{font-size:18px;font-weight:800;color:#F1F5F9;margin-bottom:4px}
.card .meta{font-size:12px;color:#64748B;margin-bottom:10px}
.card .tagline{font-size:13px;color:#94A3B8;font-style:italic;margin-bottom:14px;line-height:1.5}
.card .score-row{display:flex;justify-content:space-between;align-items:center}
.card .score-total{font-size:20px;font-weight:900}
.card .score-label{font-size:11px;color:#64748B}
.mini-bar{width:100%;height:6px;background:#334155;border-radius:3px;overflow:hidden;margin-top:8px}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .3s}

.detail{max-width:800px;margin:0 auto}
.back-btn{background:none;border:none;color:#60A5FA;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:#93C5FD}
.detail-card{background:#1E293B;border-radius:20px;padding:32px;border:1px solid #334155}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.detail-header .emoji{font-size:48px}
.detail-header h2{font-size:28px;font-weight:900;color:#F1F5F9}
.detail-header .meta{font-size:13px;color:#64748B;margin-top:4px}
.detail-tagline{font-size:16px;color:#94A3B8;font-style:italic;border-left:3px solid;padding-left:16px;margin-bottom:28px;line-height:1.6}
.section{margin-bottom:20px}
.section-title{font-size:12px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section p{font-size:14px;line-height:1.7;color:#CBD5E1}

.scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
@media(max-width:600px){.scores-grid{grid-template-columns:1fr}}
.score-item{background:#0F172A;border-radius:12px;padding:14px}
.score-item .label{font-size:12px;color:#94A3B8;margin-bottom:6px}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:8px;background:#334155;border-radius:4px;overflow:hidden}
.bar-fg{height:100%;border-radius:4px}
.val{font-size:14px;font-weight:800;min-width:35px;text-align:right}

.review-box{background:#0F172A;border-radius:14px;padding:20px;margin-top:20px;border-left:3px solid}
.review-box h4{font-size:13px;font-weight:800;margin-bottom:8px}
.review-box p{font-size:14px;line-height:1.7;color:#CBD5E1}
.improve-box{background:#0F172A;border-radius:14px;padding:20px;margin-top:12px;border-left:3px solid #34D399}
.improve-box h4{font-size:13px;font-weight:800;color:#34D399;margin-bottom:8px}
.improve-box p{font-size:14px;line-height:1.7;color:#CBD5E1}

.rank-list{max-width:800px;margin:0 auto}
.rank-item{display:flex;align-items:center;gap:16px;background:#1E293B;border-radius:14px;padding:16px 20px;margin-bottom:10px;border:1px solid #334155;transition:all .2s;cursor:pointer}
.rank-item:hover{border-color:#475569;background:#253348}
.rank-item.gold{border:2px solid #F59E0B;background:linear-gradient(135deg,#1E293B,#2D2006)}
.rank-item.silver{border:2px solid #94A3B8;background:linear-gradient(135deg,#1E293B,#1E2530)}
.rank-item.bronze{border:2px solid #CD7F32;background:linear-gradient(135deg,#1E293B,#2B1F0F)}
.rank-num{font-size:24px;font-weight:900;width:44px;text-align:center}
.rank-info{flex:1}
.rank-info .name{font-size:16px;font-weight:700;color:#F1F5F9}
.rank-info .desc{font-size:12px;color:#64748B;margin-top:2px}
.rank-score{font-size:28px;font-weight:900;text-align:right}
.rank-score span{font-size:14px;color:#64748B;font-weight:400}

.rec{max-width:800px;margin:0 auto}
.rec-intro{text-align:center;margin-bottom:28px}
.rec-intro h2{font-size:24px;font-weight:900;color:#F1F5F9;margin-bottom:8px}
.rec-intro p{font-size:14px;color:#94A3B8}
.rec-card{background:#1E293B;border-radius:16px;padding:24px;margin-bottom:16px}
.priority{font-size:12px;font-weight:800;padding:4px 14px;border-radius:8px;color:#fff;display:inline-block;margin-bottom:12px}
.name-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.name-row h3{font-size:22px;font-weight:900;color:#F1F5F9}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field-val{font-size:14px;line-height:1.6;color:#CBD5E1}
.bottom-cta{background:linear-gradient(135deg,#1E3A5F,#2D1B4E);border-radius:16px;padding:32px;margin-top:28px;text-align:center;border:1px solid #334155}
.bottom-cta h3{font-size:20px;font-weight:900;color:#F5C542;margin-bottom:12px}
.bottom-cta p{font-size:15px;line-height:1.7;color:#94A3B8}

@media(max-width:640px){
  .header h1{font-size:24px}
  .grid{grid-template-columns:1fr}
  .detail-card{padding:20px}
  .header .stats{gap:12px}
}
</style>
